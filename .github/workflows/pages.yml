name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build guestbook config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          cat > guestbook-config.js <<EOF
          window.LF_GUESTBOOK_CONFIG = {
            enabled: true,
            firebase: {
              apiKey: "${FIREBASE_API_KEY}",
              authDomain: "lostnfound-guestbook.firebaseapp.com",
              projectId: "lostnfound-guestbook",
              appId: "1:410324090575:web:1d26372ba7d0488f7c81ba"
            },
            collection: "guestbook"
          };
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
